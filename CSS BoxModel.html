<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <style>
        p {
            width: 200px;
            height: 300px;
            padding: 15px blue;
            border: 10px solid red;
            margin: 10px rgb(248, 248, 4);
            background-color: black;
            color: aliceblue;
            box-sizing: border-box;
        }
        div {
            width: 200px;
            height: 300px;
            padding: 15px grey;
            border: 10px solid red;
            margin: 5px;
            background-color: aqua;
        }
    </style>
</head>
<body>
    <p>Soumyadeep Roy</p>
    <div>This is normal</div>
</body>
</html>
